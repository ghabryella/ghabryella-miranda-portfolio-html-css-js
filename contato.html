<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Portifólio Pessoal</title>
    <link rel="stylesheet" href="styles.css"> <!--link para o arquivo CSS-->
</head>

<body>

    <!--toast para exibir mensagens  temporárias de sucesso ou erro ao enviar formulario-->
    <div id="toast" class="toast"></div>


    <!--menu de navegação-->
    <header class="cabecalho">

        <!--lista não ordenada com os itens do menu de navegação-->
        <ul style="display: flex; flex-direction: row; margin: 0px; height: 100%; align-items: center; padding: unset;">
            <li><a href="index.html">SOBRE MIM</a></li>
            <li><a href="formacao.html">FORMAÇÃO</a></li>
            <li> <a href="portfolio.html">PORTFÓLIO</a></li>
            <li class=" menu-item-clicado-modo-claro"><a href="contato.html">CONTATO</a></li> <!--item ativo do menu de navegação-->
        </ul>

        <span id="botao" class="botao-inverter-modo">☾</span>
        <!--botão que alterna entre modo escuro e claro-->

    </header>

    <div>
        <!--retângulo que contém o formulário de contato-->
        <div class="retangulo-contato">

            <div class="centralizar-titulo-contato">
                <span style="font-size: 40px; font-weight: 450">Entre em contato</span> <!--título principal-->
                <span style="font-size: 20px; margin-bottom: 5px; margin-top: 10px;">Envie sua mensagem pelo formulário
                    abaixo.</span> <!--subtítulo-->
            </div>

            <!--formulário com validação via js antes do envio-->
            <form id="contato" method="post">

                <!--grid layout para organizar os campos em duas colunas-->
                <div class="parent">

                    <!--campo nome-->
                    <input class="campo-nome" type="text" id="nome" name="nome" placeholder="Nome" required>

                    <!--campo sobrenome-->
                    <input class="campo-sobrenome" type="text" id="sobrenome" name="sobrenome" placeholder="Sobrenome" required>

                    <!--campo email-->
                    <input class="campo-email" type="email" id="email" name="email" placeholder="E-mail" required>

                    <!--campo telefone-->
                    <input class="campo-numero" type="text" id="numero" name="numero" placeholder="Número de telefone" required>

                    <!--campo mensagem-->
                    <textarea class="campo-mensagem" id="mensagem" name="mensagem" placeholder="Digite sua mensagem..."
                        required></textarea>

                    <!--botão de envio do formulário-->
                    <button class="campo-botao" type="submit" id="enviar" style="font-size: 17px; width: 100%;">Enviar</button>

                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script> <!--script js para funcionalidades da página-->
</body>

</html>
