<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Portifólio Pessoal - Ghabryella</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="cabecalho">
        <ul style="display: flex; flex-direction: row; margin: 0px; height: 100%; align-items: center; padding: unset;">
            <li><a href="index.html">SOBRE MIM</a></li>
            <li><a href="formacao.html">FORMAÇÃO</a></li>
            <li> <a href="portifolio.html">PORTIFÓLIO</a></li>
            <li class=" menu-item-clicado-modo-claro"><a href="contato.html">CONTATO</a></li>
        </ul>
    </header>

    <div>
        <div class="retangulo-contato">

            <div class="centralizar-titulo-contato">
                <span style="font-size: 40px;">Entre em contato</span>
                <span style="font-size: 18px; margin-bottom: 5px;">Envie sua mensagem pelo formulário abaixo.</span>
            </div>

            <form action="/contatar" method="post">
                <div class="parent">


                    <input class="div1" type="text" id="nome" name="nome" placeholder="Nome" required>


                    <input class="div2" type="text" id="sobrenome" name="sobrenome" placeholder="Sobrenome" required>


                    <input class="div3" type="email" id="email" name="email" placeholder="E-mail" required>


                    <input class="div4" type="number" id="numero" name="numero" placeholder="Número de telefone"
                        required>

                    <textarea class="div5" id="mensagem" name="mensagem" placeholder="Digite sua mensagem..."
                        required></textarea>

                    <button class="div6" style="font-size: 17px; width: 100%;">Enviar</button>


                </div>
            </form>
        </div>
    </div>

</body>

</html>
